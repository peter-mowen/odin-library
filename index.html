<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
  <title>Odin Library</title>
</head>
<body>
  <nav>
    <ul>
      <li>
        <a href="index.html">Library</a>
      </li>
      <li>
        <a href="">Project Requirements</a>
      </li>
    </ul>
  </nav>
  <div class="add-book-container">
    <div class="add-book-overlay">
      <div class="add-book-title">Add Books!</div>
      <div class="add-book-subtitle">Books will appear below as cards</div>
      <button>Add Book</button>
    </div>
    <div class="background-image-citation">
      Photo by
      <a href="https://unsplash.com/@tama66?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">
        Peter Herrmann
      </a>
      on
      <a href="https://unsplash.com/photos/brown-wooden-book-shelves-with-books-aT88kga0g_M?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">
        Unsplash
      </a>
    </div>
  </div>
  <div class="library-container">
    <div class="card">
      <div class="card-title">Wind and Truth</div>
      <hr>
      <div class="card-author">Brandon Sanderson</div>
      <div class="card-number-of-pages">1344 pages</div>
      <div class="card-have-read-container">
        <label class="card-switch">
          <input type="checkbox" checked>
          <span class="card-slider round"></span>
        </label>
        <span>I have read this</span>
      </div>
      <button type="button"></button>
    </div>
    <div class="card">
      <div class="card-title">The Mismeasure of Man</div>
      <hr>
      <div class="card-author">Stephen Jay Gould</div>
      <div class="card-number-of-pages">352 pages</div>
      <div class="card-have-read-container">
        <label class="card-switch">
          <input type="checkbox">
          <span class="card-slider round"></span>
        </label>
        <span>I have not read this</span>
      </div>
      <button type="button"></button>
    </div>
  </div>
  <script src="library.js"></script>
</body>
</html>
