<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
  <title>Odin Library</title>
</head>
<body>
  <nav>
    <ul>
      <li>
        <a href="index.html">Library</a>
      </li>
      <li>
        <a href="">Project Requirements</a>
      </li>
    </ul>
  </nav>
  <div class="add-book-container">
    <div class="add-book-overlay">
      <div class="add-book-title">Add Books!</div>
      <div class="add-book-subtitle">Books will appear below as cards</div>
      <button id="add-book-btn">Add Book</button>
    </div>
    <dialog id="add-book-dialog" class="add-book-modal">
      <form action="" class="add-book-modal-content">
        <span class="add-book-modal-close">&times;</span>
        <h2 class="add-book-modal-title">Book Details</h2>
        <hr>
        <label for="book-title" class="add-book-form-label">
          Title
          <input type="text" name="book-title" id="book-title" placeholder="Title...">
        </label>
        <label for="book-author" class="add-book-form-label">
          Author
          <input type="text" name="book-author" id="book-author" placeholder="Author...">
        </label>
        <label for="book-num-of-pages" class="add-book-form-label">
          Number of Pages
          <input type="tel" name="book-num-of-pages" id="book-num-of-pages" placeholder="Number of pages...">
        </label>
        <div class="add-book-modal-last-row">
          <div>
            <label class="switch">
              <input type="checkbox">
              <span class="card-slider round"></span>
            </label>
            <span>I have not read this</span>
          </div>
          <button>Save</button>
        </div>
      </form>
    </dialog>
    <div class="background-image-citation">
      Photo by
      <a href="https://unsplash.com/@tama66?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">
        Peter Herrmann
      </a>
      on
      <a href="https://unsplash.com/photos/brown-wooden-book-shelves-with-books-aT88kga0g_M?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">
        Unsplash
      </a>
    </div>
  </div>
  <div class="library-container"></div>
  <script src="library.js"></script>
</body>
</html>
